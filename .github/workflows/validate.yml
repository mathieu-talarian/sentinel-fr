name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Read-only — `packages: read` is needed to fetch the private
# @mathieu-talarian scope from GitHub Packages.
permissions:
  contents: read
  packages: read

# Cancel in-flight runs of this workflow on the same ref so a force-push
# during validation doesn't waste a runner.
concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Format · Lint · Type · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Corepack ships with Node 16+; running it BEFORE setup-node uses the
      # runner's pre-installed Node to register the yarn shim. setup-node
      # then installs Node 22, but the shim points at corepack which reads
      # `packageManager: yarn@4.14.1` from package.json — so every later
      # `yarn` invocation runs Yarn 4, not the runner's default Yarn 1.
      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      # Yarn 4 (berry) reads scoped tokens from `npmScopes.<scope>.npmAuthToken`.
      # We inject GITHUB_TOKEN at runtime so .yarnrc.yml stays secret-free.
      - name: Configure private registry auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn config set 'npmScopes.mathieu-talarian.npmAuthToken' "$NODE_AUTH_TOKEN"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Prettier check
        run: yarn run check

      - name: ESLint
        run: yarn run lint

      - name: Typecheck
        run: yarn run type

      - name: Tests
        run: yarn run test

  secrets:
    name: Secret scan (trufflehog)
    runs-on: ubuntu-latest
    # Independent of `build` so a leaked secret blocks the PR even if the
    # build stage failed earlier (and vice versa). Cheap to run in parallel.
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so trufflehog can inspect every commit on the PR /
          # push range, not just the tip.
          fetch-depth: 0

      # `--results=verified,unknown` is TruffleHog's recommended setting:
      # `verified` = secret tested live against the issuing API and confirmed
      # valid; `unknown` = couldn't be verified (offline / rate-limited /
      # detector has no verifier). Skipping `unverified` cuts the noise from
      # false-positive regex matches that TruffleHog couldn't confirm.
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: >-
            --results=verified,unknown
            --exclude-paths=.trufflehog-exclude
