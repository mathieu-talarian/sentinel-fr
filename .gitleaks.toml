# Gitleaks config — extends the bundled default ruleset.
# https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
[extend]
useDefault = true

# Firebase web config (apiKey, authDomain, …) is public-by-design — the
# `apiKey` identifies the Firebase project, it does NOT authenticate. Backend
# access is gated by Firebase Admin SDK verifying ID tokens server-side.
# Default rules flag the `AIzaSy…` prefix as a Google API key, so we allowlist
# the one file that holds the web config.
[allowlist]
description = "Firebase web config + local tooling that's already gitignored"
paths = [
  '''src/lib/firebase/index\.ts$''',
  '''^\.claude/''',
  '''^\.claude-flow/''',
  '''^\.serena/''',
  '''^\.agents/''',
]
